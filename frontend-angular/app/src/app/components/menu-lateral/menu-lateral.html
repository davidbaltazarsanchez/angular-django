<!-- BACKDROP -->
<div class="offcanvas-backdrop fade" [class.show]="show" (click)="hide.emit()"></div>
<!-- MENÚ -->
<div
  class="menu-lateral offcanvas"
  [class.show]="show"
  [style.transform]="show ? 'translateX(0)' : 'translateX(-100%)'"
  [style.opacity]="show ? '1' : '0'"
>
  <div class="offcanvas-body d-flex flex-column h-100 text-white">
    <hr class="menu-divider" />

    <!-- OPCIONES -->
    <ul class="menu-items list-unstyled">
      <li class="menu-item" (click)="seleccionar(VISTAS.INICIO)">
        <lucide-icon name="home" [size]="18" class="menu-icon"></lucide-icon>
        <span>Inicio</span>
      </li>

      <li class="menu-item" (click)="seleccionar(VISTAS.REVISAPPTX)">
        <lucide-icon name="columns-4" [size]="18" class="menu-icon"></lucide-icon>
        <span>Revisar Fichas</span>
      </li>

      <li class="menu-item" (click)="seleccionar(VISTAS.EXCEL)">
        <lucide-icon name="between-horizontal-start" [size]="18" class="menu-icon"></lucide-icon>
        <span>Carga de Información</span>
      </li>

      <li class="menu-item" (click)="seleccionar(VISTAS.BITACORA)">
        <lucide-icon name="panels-top-left" [size]="18" class="menu-icon"></lucide-icon>
        <span>Bitácora - Carga de Información</span>
      </li>

      <li class="menu-item">
        <lucide-icon name="layout-dashboard" [size]="18" class="menu-icon"></lucide-icon>
        <span>Tableros de Información</span>
      </li>

      <li class="menu-item" (click)="cerrarSesion()">
        <lucide-icon name="log-out" [size]="18" class="menu-icon"></lucide-icon>
        <span>Cerrar Sesión</span>
      </li>
    </ul>

    <!-- PIE -->
    <div class="mt-auto" style="padding-bottom: 20px">
      <div class="d-flex" style="padding-left: 25px">
        <i
          class="bi bi-facebook gold-icon cursor-pointer"
          style="font-size: 24px; margin-right: 20px"
        ></i>
        <i
          class="bi bi-twitter gold-icon cursor-pointer"
          style="font-size: 24px; margin-right: 20px"
        ></i>
        <i
          class="bi bi-instagram gold-icon cursor-pointer"
          style="font-size: 24px; margin-right: 20px"
        ></i>
        <i class="bi bi-youtube gold-icon cursor-pointer" style="font-size: 24px"></i>
      </div>
    </div>
  </div>
</div>
